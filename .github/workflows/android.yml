name: Build APK from ZIP

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Забираем репозиторий
      - uses: actions/checkout@v3

      # 2. Устанавливаем unzip и JDK 17
      - name: Install unzip & JDK
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip openjdk-17-jdk

      # 3. Скачиваем и настраиваем Gradle 8.2
      - name: Download and setup Gradle 8.2
        run: |
          wget https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip gradle-8.2-bin.zip -d $HOME/gradle
          export PATH=$HOME/gradle/gradle-8.2/bin:$PATH
          gradle --version

      # 4. Распаковываем ZIP с проектом
      - name: Unzip project
        run: unzip 1.zip -d project

      # 5. Сборка APK
      - name: Build APK
        run: |
          cd project
          gradle assembleDebug

      # 6. Загрузка APK как артефакт
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: project/app/build/outputs/apk/debug/app-debug.apk

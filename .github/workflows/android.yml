name: Build APK with Gradle 8.2

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install unzip & JDK 17
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip openjdk-17-jdk

      - name: Download Gradle 8.2
        run: |
          wget https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip gradle-8.2-bin.zip -d $HOME/gradle
          export PATH=$HOME/gradle/gradle-8.2/bin:$PATH
          gradle --version

      - name: Unzip project
        run: unzip 1.zip -d project

      - name: Build APK
        run: |
          cd project
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: project/app/build/outputs/apk/debug/app-debug.apk

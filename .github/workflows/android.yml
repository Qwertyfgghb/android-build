name: Build APK from ZIP

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install unzip
        run: sudo apt-get install unzip

      - name: Unzip project
        run: unzip 1.zip

      - name: List files
        run: ls

      - name: Find gradlew
        run: chmod +x */gradlew

      - name: Build APK
        run: |
          cd */
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: apk
          path: */app/build/outputs/apk/debug/*.apk

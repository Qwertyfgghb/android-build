name: Build APK from ZIP

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Забираем репозиторий
      - uses: actions/checkout@v3

      # 2. Скачиваем Gradle 8.2 и собираем APK в одном шаге
      - name: Build APK with Gradle 8.2
        run: |
          # Устанавливаем unzip и JDK 17
          sudo apt-get update
          sudo apt-get install -y unzip openjdk-17-jdk

          # Скачиваем Gradle 8.2
          wget https://services.gradle.org/distributions/gradle-8.2-bin.zip

          # Распаковываем Gradle
          unzip gradle-8.2-bin.zip -d $HOME/gradle

          # Добавляем Gradle в PATH
          export PATH=$HOME/gradle/gradle-8.2/bin:$PATH

          # Проверяем версию Gradle
          gradle --version

          # Распаковываем ZIP с проектом
          unzip 1.zip -d project

          # Переходим в папку проекта
          cd project

          # Собираем APK
          gradle assembleDebug

      # 3. Загружаем APK как артефакт
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: project/app/build/outputs/apk/debug/app-debug.apk

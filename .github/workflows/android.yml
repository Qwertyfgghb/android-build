name: Build APK from ZIP (no gradlew)

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install unzip & gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip gradle openjdk-17-jdk

      - name: Unzip project
        run: unzip 1.zip -d project

      - name: Build APK
        run: |
          cd project
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: project/app/build/outputs/apk/debug/app-debug.apk
